{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <title>Kirish</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/inapp/style.css' %}">
</head>
<body class="bg-light">
<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card" style="max-width:420px; width:100%;">
    <div class="card-body p-5">
      <div class="text-center mb-3">
        <img src="{% static 'images/logo-icon.svg' %}" alt="logo" width="36">
        <h1 class="h5 mt-3">Hisobga kirish</h1>
      </div>
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger py-2">{{ message }}</div>
        {% endfor %}
      {% endif %}
      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="mb-3">
          <label for="username" class="form-label">Foydalanuvchi nomi</label>
          <input id="username" type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Parol</label>
          <input id="password" type="password" name="password" class="form-control" required>
        </div>
        <div class="form-check mb-3">
          <input id="remember" name="rememberme" class="form-check-input" type="checkbox">
          <label class="form-check-label" for="remember">Meni 14 kun eslab qol</label>
        </div>
        <button class="btn btn-primary w-100" type="submit">Kirish</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
