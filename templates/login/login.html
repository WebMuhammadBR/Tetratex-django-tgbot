{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish</title>
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
  <div class="background-wrap">
    <div class="background"></div>
  </div>

  <form id="accesspanel" action="{% url 'login' %}" method="post">
    {% csrf_token %}
    <h1 id="litheader">TETRATEX MCHJ</h1>
    <div class="inset">
      {% if messages %}
        {% for message in messages %}
          <p class="login-message {{ message.tags }}">{{ message }}</p>
        {% endfor %}
      {% endif %}
      <p>
        <input type="text" name="username" id="email" placeholder="Foydalanuvchi nomi" required>
      </p>
      <p>
        <input type="password" name="password" id="password" placeholder="Parol" required>
      </p>
      <div style="text-align: center;">
        <div class="checkboxouter">
          <input type="checkbox" name="rememberme" id="remember">
          <label class="checkbox" for="remember"></label>
        </div>
        <label for="remember">Meni 14 kun eslab qol</label>
      </div>
    </div>
    <p class="p-container">
      <input type="submit" name="Kirish" id="go" value="Kirish">
    </p>
  </form>

  <script src="{% static 'js/loginjs.js' %}"></script>
</body>
</html>
